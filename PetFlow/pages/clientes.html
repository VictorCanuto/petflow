<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <script>
        if (!localStorage.getItem('petflow_token')) {
            window.location.href = '../login.html';
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes - PetFlow</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../assets/css/style.css?v=2">
</head>
<body class="bg-light-custom">

    <div class="container-fluid">
        <div class="row">
            
            <nav class="col-md-3 col-lg-2 d-md-block bg-white sidebar vh-100 shadow-sm fixed-top">
                <div class="position-sticky pt-4 px-3 d-flex flex-column h-100">
                    <h4 class="fw-bold text-primary-custom mb-5 text-center">🐾 PetFlow</h4>
                    
                    <ul class="nav flex-column gap-2 mb-auto">
                        <li class="nav-item">
                            <a class="nav-link text-secondary fw-semibold px-3" href="dashboard.html">📊 Dashboard</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link bg-primary-soft text-primary-custom fw-bold rounded-3 px-3" href="clientes.html">👥 Clientes</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-secondary fw-semibold px-3" href="pets.html">🐕 Pets</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-secondary fw-semibold px-3" href="agendamentos.html">📅 Agendamentos</a>
                        </li>
                    </ul>

                    <div class="mt-auto pb-4 pt-3 border-top">
                        <a class="btn btn-outline-danger w-100 rounded-pill fw-bold btn-sm" href="../index.html">
                            Sair do Sistema
                        </a>
                    </div>
                </div>
            </nav>

            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-5 pt-4 pb-5">
                
                <header class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center mb-5 gap-3">
                    <div>
                        <h2 class="fw-bold text-dark mb-1">Gestão de Clientes</h2>
                        <p class="text-secondary small mb-0">Cadastre e gerencie os tutores dos pets.</p>
                    </div>
                    
                    <div class="d-flex align-items-center gap-3">
                        <div class="input-group shadow-sm rounded-pill bg-white" style="max-width: 250px;">
                            <span class="input-group-text bg-white border-end-0 rounded-start-pill text-secondary">
                                <i class="bi bi-search"></i>
                            </span>
                            <input type="text" id="inputBuscaClientes" class="form-control border-start-0 rounded-end-pill" placeholder="Buscar por nome ou CPF...">
                        </div>
                        <button onclick="prepararNovoCliente()" class="btn btn-primary-custom rounded-pill px-4 fw-bold shadow-sm text-nowrap" data-bs-toggle="modal" data-bs-target="#modalCliente"> + Novo Cliente </button>
                    </div>
                </header>

                <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
                    <div class="card-body px-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="bg-light">
                                    <tr>
                                        <th class="ps-4 border-0 text-secondary small">Nome do Cliente</th>
                                        <th class="border-0 text-secondary small">Contato</th>
                                        <th class="border-0 text-secondary small">Pet(s)</th>
                                        <th class="text-end pe-4 border-0 text-secondary small">Ações</th>
                                    </tr>
                                </thead>
                                <tbody id="tabelaClientes">
                            </tbody>
                            </table>
                        </div>
                    </div>
                </div>

            </main>
        </div>
    </div>

    <div class="modal fade" id="modalCliente" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 rounded-4 shadow">
                <div class="modal-header border-0 pt-4 px-4 pb-0">
                    <h5 class="fw-bold text-dark" id="tituloModalCliente">Cadastrar Novo Cliente</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="formNovoCliente">
                        <input type="hidden" id="idClienteId">
                        <div class="row g-3">
                            <div class="col-12">
                                <label class="form-label small fw-bold text-secondary">Nome Completo</label>
                                <input type="text" id="nomeCliente" class="form-control rounded-3" placeholder="Ex: José da Silva" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-bold text-secondary">CPF</label>
                                <input type="text" id="cpfCliente" class="form-control rounded-3" placeholder="000.000.000-00" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-bold text-secondary">Telefone / WhatsApp</label>
                                <input type="text" id="telefoneCliente" class="form-control rounded-3" placeholder="(82) 90000-0000" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label small fw-bold text-secondary">E-mail</label>
                                <input type="email" id="emailCliente" class="form-control rounded-3" placeholder="email@exemplo.com">
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary-custom w-100 rounded-pill py-2 fw-bold mt-4 shadow-sm" id="btnSalvarCliente">
                            Salvar Cliente
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/script.js"></script>
</body>
</html>
