<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <script>
        if (!localStorage.getItem('petflow_token')) {
            window.location.href = '../login.html';
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamentos - PetFlow</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../assets/css/style.css?v=2">
</head>
<body class="bg-light-custom">

    <div class="container-fluid">
        <div class="row">
            
            <nav class="col-md-3 col-lg-2 d-md-block bg-white sidebar vh-100 shadow-sm fixed-top">
                <div class="position-sticky pt-4 px-3 d-flex flex-column h-100">
                    <h4 class="fw-bold text-primary-custom mb-5 text-center">🐾 PetFlow</h4>
                    
                    <ul class="nav flex-column gap-2 mb-auto">
                        <li class="nav-item">
                            <a class="nav-link text-secondary fw-semibold px-3" href="dashboard.html">📊 Dashboard</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-secondary fw-semibold px-3" href="clientes.html">👥 Clientes</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-secondary fw-semibold px-3" href="pets.html">🐕 Pets</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link bg-primary-soft text-primary-custom fw-bold rounded-3 px-3" href="agendamentos.html">📅 Agendamentos</a>
                        </li>
                    </ul>

                    <div class="mt-auto pb-4 pt-3 border-top">
                        <a class="btn btn-outline-danger w-100 rounded-pill fw-bold btn-sm" href="../index.html">
                            Sair do Sistema
                        </a>
                    </div>
                </div>
            </nav>

            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-5 pt-4 pb-5">
                
                <header class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center mb-4 gap-3">
                    <div>
                        <h2 class="fw-bold text-dark mb-1">Agenda de Serviços</h2>
                        <p class="text-secondary small mb-0">Gerencie os horários e o fluxo de atendimentos.</p>
                    </div>
                    
                    <div class="d-flex align-items-center gap-3">
                        <div class="input-group shadow-sm rounded-pill bg-white" style="max-width: 250px;">
                            <span class="input-group-text bg-white border-end-0 rounded-start-pill text-secondary">
                                <i class="bi bi-search"></i>
                            </span>
                            <input type="text" id="inputBuscaAgendamentos" class="form-control border-start-0 rounded-end-pill" placeholder="Buscar tutor ou pet...">
                        </div>
                        
                        <button class="btn btn-primary-custom rounded-pill px-4 fw-bold shadow-sm text-nowrap" data-bs-toggle="modal" data-bs-target="#modalNovoAgendamento">
                            + Novo Agendamento
                        </button>
                    </div>
                </header>

                <div class="d-flex align-items-center gap-3 mb-4 p-3 bg-white rounded-4 shadow-sm border border-light">
                    <label class="fw-bold text-dark mb-0"><i class="bi bi-calendar3 text-primary-custom me-2"></i>Data da Agenda:</label>
                    <input type="date" id="dataFiltroAgenda" class="form-control form-control-sm rounded-3 w-auto border-secondary">
                    <button id="btnFiltroHoje" class="btn btn-sm btn-light border text-secondary rounded-3">Hoje</button>
                </div>

                <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
                    <div class="card-body px-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="bg-light">
                                    <tr>
                                        <th class="ps-4 border-0 text-secondary small">Horário</th>
                                        <th class="border-0 text-secondary small">Pet</th>
                                        <th class="border-0 text-secondary small">Tutor</th>
                                        <th class="border-0 text-secondary small">Serviço</th>
                                        <th class="border-0 text-secondary small">Status</th>
                                        <th class="text-end pe-4 border-0 text-secondary small">Ações</th>
                                    </tr>
                                </thead>
                                <tbody id="tabelaAgendamentos">
                                    <tr>
                                        <td colspan="6" class="text-center py-4 text-secondary">
                                            <div class="spinner-border spinner-border-sm me-2 text-primary-custom" role="status"></div>
                                            Carregando agendamentos...
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

            </main>
        </div>
    </div>

    <div class="modal fade" id="modalNovoAgendamento" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 rounded-4 shadow">
                <div class="modal-header border-0 pt-4 px-4 pb-0">
                    <h5 class="fw-bold text-dark">Agendar Serviço</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="formNovoAgendamento">
                        <input type="hidden" id="novoAgendamentoIdCliente">
                        <input type="hidden" id="novoAgendamentoIdPet">
                        <div class="row g-3">
                            
                            <div class="col-12 position-relative custom-dropdown">
                                <label class="form-label small fw-bold text-secondary">Tutor / Cliente</label>
                                <input type="text" id="novoAgendamentoTutorInput" class="form-control rounded-3 text-secondary input-busca" placeholder="Digite para buscar tutor (ex: Joao)..." autocomplete="off" required>
                                <ul id="novoAgendamentoTutorLista" class="list-group position-absolute w-100 shadow mt-1 d-none lista-opcoes" style="z-index: 1000; max-height: 150px; overflow-y: auto;">
                                    <!-- Carregado via JS -->
                                </ul>
                            </div>

                            <div class="col-12 position-relative custom-dropdown">
                                <label class="form-label small fw-bold text-secondary">Pet</label>
                                <input type="text" id="novoAgendamentoPetInput" class="form-control rounded-3 text-secondary input-busca" placeholder="Selecione um tutor primeiro..." autocomplete="off" disabled required>
                                <ul id="novoAgendamentoPetLista" class="list-group position-absolute w-100 shadow mt-1 d-none lista-opcoes" style="z-index: 1000; max-height: 150px; overflow-y: auto;">
                                    <!-- Carregado via JS -->
                                </ul>
                            </div>

                            <div class="col-6">
                                <label class="form-label small fw-bold text-secondary">Data</label>
                                <input type="date" id="novoAgendamentoData" class="form-control rounded-3 text-secondary" required>
                            </div>
                            <div class="col-6">
                                <label class="form-label small fw-bold text-secondary">Horário</label>
                                <input type="time" id="novoAgendamentoHorario" class="form-control rounded-3 text-secondary" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label small fw-bold text-secondary">Serviço</label>
                                <select id="novoAgendamentoServico" class="form-select rounded-3 text-secondary" required>
                                    <option value="" disabled selected>Selecione um serviço...</option>
                                    <option value="Banho e Tosa Completa">Banho e Tosa Completa</option>
                                    <option value="Apenas Banho">Apenas Banho</option>
                                    <option value="Tosa Higiênica">Tosa Higiênica</option>
                                </select>
                            </div>
                        </div>
                        <button type="submit" id="btnConfirmarAgendamento" class="btn btn-primary-custom w-100 rounded-pill py-2 fw-bold mt-4 shadow-sm">
                            Confirmar Agendamento
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Status Agendamento Único e Dinâmico -->
    <div class="modal fade" id="modalStatusAgendamento" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content border-0 rounded-4 shadow">
                <div class="modal-header border-0 pb-0">
                    <h6 class="fw-bold text-dark w-100 text-center" id="tituloModalStatus">Status de Pet</h6>
                    <button type="button" class="btn-close position-absolute end-0 me-3" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <input type="hidden" id="statusAgendamentoId">
                    <div class="mb-3">
                        <label for="statusNotaFuncionario" class="form-label small fw-bold text-secondary">Nota de Acompanhamento (Opcional)</label>
                        <textarea id="statusNotaFuncionario" class="form-control rounded-3 text-secondary small" rows="2" placeholder="Digite uma observação sobre o pet..."></textarea>
                    </div>
                    <div class="d-grid gap-2 mb-3" id="statusBotoesContainer">
                        <!-- Carregado via JS dinamicamente baseando-se no serviço do pet -->
                    </div>
                    <hr class="my-2">
                    <div class="d-grid">
                        <button type="button" class="btn btn-outline-danger text-start border rounded-3 fw-semibold btn-excluir-agendamento-modal">
                            <i class="bi bi-trash me-2"></i> Excluir Agendamento
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script src="../assets/js/script.js"></script>
</body>
</html>
