<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Administrativo - PetFlow</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <!-- Puxando o seu CSS centralizado -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-light-custom">

    <!-- Container ocupando 100% da altura da tela, centralizando o conteúdo -->
    <div class="container min-vh-100 d-flex align-items-center justify-content-center">
        
        <!-- Cartão de Login -->
        <div class="card border-0 shadow-lg rounded-4 p-4 p-md-5 transition-hover" style="max-width: 450px; width: 100%;">
            
            <div class="text-center mb-4">
                <div class="bg-primary-soft d-inline-flex justify-content-center align-items-center rounded-circle mb-3" style="width: 70px; height: 70px;">
                    <i class="bi bi-shop fs-1 text-primary-custom"></i>
                </div>
                <h3 class="fw-bold text-dark mb-1">PetFlow</h3>
                <p class="text-secondary small">Acesso restrito para colaboradores</p>
            </div>

            <div id="loginErro" class="alert alert-danger d-none rounded-3 py-2 small text-center" role="alert"></div>

            <form id="formLogin">
                <div class="mb-3">
                    <label class="form-label small fw-bold text-secondary">E-mail</label>
                    <div class="input-group shadow-sm">
                        <span class="input-group-text bg-white border-end-0 text-secondary"><i class="bi bi-envelope"></i></span>
                        <input type="email" class="form-control border-start-0 ps-0 rounded-end" placeholder="admin@petflow.com.br" required>
                    </div>
                </div>
                
                <div class="mb-4">
                    <label class="form-label small fw-bold text-secondary">Senha</label>
                    <div class="input-group shadow-sm">
                        <span class="input-group-text bg-white border-end-0 text-secondary"><i class="bi bi-lock"></i></span>
                        <input type="password" class="form-control border-start-0 ps-0 rounded-end" placeholder="••••••••" required>
                    </div>
                    <div class="text-end mt-1">
                        <a href="#" class="small text-primary-custom text-decoration-none">Esqueceu a senha?</a>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary-custom w-100 rounded-pill py-2 fw-bold shadow-sm" id="btnLogin">
                    Entrar no Sistema
                </button>
            </form>

            <div class="text-center mt-5 pt-3 border-top">
                <a href="index.html" class="text-decoration-none small text-secondary">
                    <i class="bi bi-arrow-left"></i> Voltar para a página inicial
                </a>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Lógica de autenticação com o Back-end -->
    <script>
        document.getElementById('formLogin').addEventListener('submit', async function(e) {
            e.preventDefault(); // Impede que a página recarregue ao enviar o formulário

            const btn = document.getElementById('btnLogin');
            const erroDiv = document.getElementById('loginErro');
            const email = e.target.querySelector('input[type="email"]').value;
            const senha = e.target.querySelector('input[type="password"]').value;

            // Oculta erro anterior
            erroDiv.classList.add('d-none');
            erroDiv.innerText = '';

            const textoOriginal = btn.innerHTML;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span> Autenticando...';
            btn.disabled = true;

            const API_BASE = window.location.protocol === 'file:' ? 'http://localhost:3000' : '';
            try {
                const resposta = await fetch(`${API_BASE}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, senha })
                });

                const resultado = await resposta.json();

                if (resposta.ok) {
                    // Armazena o token de autenticação
                    localStorage.setItem('petflow_token', resultado.token);
                    // Redireciona para o Dashboard administrativo
                    window.location.href = 'pages/dashboard.html';
                } else {
                    erroDiv.innerText = resultado.erro || 'E-mail ou senha inválidos.';
                    erroDiv.classList.remove('d-none');
                    btn.innerHTML = textoOriginal;
                    btn.disabled = false;
                }
            } catch (erro) {
                console.error(erro);
                erroDiv.innerText = 'Não foi possível se comunicar com o servidor. Verifique se o servidor está ligado.';
                erroDiv.classList.remove('d-none');
                btn.innerHTML = textoOriginal;
                btn.disabled = false;
            }
        });
    </script>
    <script>
        if (window.location.protocol === 'file:') {
            const banner = document.createElement('div');
            banner.className = 'alert alert-danger text-center m-0 rounded-0 border-0 border-bottom border-danger-subtle';
            banner.style.cssText = 'position: fixed; top: 0; left: 0; right: 0; z-index: 1060; font-size: 0.9rem;';
            banner.innerHTML = '<strong>⚠️ Modo de Arquivo Local Detectado:</strong> Para que o banco de dados e o login funcionem corretamente, acesse o sistema através de <a href="http://localhost:3000/login.html" class="alert-link text-decoration-underline">http://localhost:3000/login.html</a>';
            document.body.prepend(banner);
            document.body.classList.add('pt-5');
        }
    </script>
</body>
</html>
